change: add-planner
version: "1"
created_at: 2026-03-26T15:36:47.699Z
nodes:
  - id: snapshot
    type: deterministic
    description: Capture environment snapshot (file tree, deps, types)
    command: foreman snapshot
    deps: []
    inputs: []
    outputs:
      - .foreman/env/snapshot.md
    scope: []
    validate:
      - type: file-exists
        args:
          path: .foreman/env/snapshot.md
    retry: 2
  - id: write-tests
    type: llm
    description: Write tests from specs (must be RED before implementation)
    agent: foreman-test-writer
    gate: human
    model: opus
    deps:
      - snapshot
    inputs:
      - .foreman/env/snapshot.md
    outputs:
      - src/__tests__/
    scope:
      - src/__tests__/
    validate:
      - type: tests-fail
    retry: 2
  - id: impl-1-1
    type: llm
    description: Create `.claude/agents/foreman-planner.md` — agent that researches codebase, asks clarifying questions, generates change artifacts
    agent: foreman-implementer
    deps:
      - write-tests
    inputs:
      - .foreman/env/snapshot.md
    outputs: &a1
      - src/
    scope: *a1
    validate:
      - type: tsc-check
      - type: tests-pass
    retry: 2
  - id: impl-1-2
    type: llm
    description: 'Add `--yolo` flag to `src/cli/plan.ts` — outputs `mode: "yolo" | "brainstorm"` in JSON'
    agent: foreman-implementer
    deps:
      - impl-1-1
    inputs:
      - .foreman/env/snapshot.md
    outputs: &a2
      - src/
    scope: *a2
    validate:
      - type: tsc-check
      - type: tests-pass
    retry: 2
  - id: impl-2-1
    type: llm
    description: Update `src/cli/go.ts` — auto-run `graph generate` if no graph.yaml exists
    agent: foreman-implementer
    deps:
      - write-tests
    inputs:
      - .foreman/env/snapshot.md
    outputs: &a3
      - src/
    scope: *a3
    validate:
      - type: tsc-check
      - type: tests-pass
    retry: 2
  - id: impl-2-2
    type: llm
    description: Add tests for auto-graph-generation in go command
    agent: foreman-implementer
    deps:
      - impl-2-1
    inputs:
      - .foreman/env/snapshot.md
    outputs: &a4
      - src/
    scope: *a4
    validate:
      - type: tsc-check
      - type: tests-pass
    retry: 2
  - id: impl-3-1
    type: llm
    description: Update `.claude/commands/foreman-plan.md` — orchestrate two-phase planner flow
    agent: foreman-implementer
    deps:
      - write-tests
    inputs:
      - .foreman/env/snapshot.md
    outputs: &a5
      - src/
    scope: *a5
    validate:
      - type: tsc-check
      - type: tests-pass
    retry: 2
  - id: impl-3-2
    type: llm
    description: Update `.claude/commands/foreman-go.md` — document auto-graph behavior
    agent: foreman-implementer
    deps:
      - impl-3-1
    inputs:
      - .foreman/env/snapshot.md
    outputs: &a6
      - src/
    scope: *a6
    validate:
      - type: tsc-check
      - type: tests-pass
    retry: 2
  - id: integration
    type: deterministic
    description: Run full test suite (integration verification)
    command: npm test
    deps:
      - impl-1-2
      - impl-2-2
      - impl-3-2
    inputs: []
    outputs: []
    scope: []
    validate:
      - type: tests-pass
    retry: 1
