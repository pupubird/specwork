change: improve-dx
version: "1"
created_at: 2026-03-26T15:20:24.297Z
nodes:
  - id: snapshot
    type: deterministic
    description: Capture environment snapshot (file tree, deps, types)
    command: foreman snapshot
    deps: []
    inputs: []
    outputs:
      - .foreman/env/snapshot.md
    scope: []
    validate:
      - type: file-exists
        args:
          path: .foreman/env/snapshot.md
    retry: 2
  - id: write-tests
    type: llm
    description: Write tests from specs (must be RED before implementation)
    agent: foreman-test-writer
    gate: human
    model: opus
    deps:
      - snapshot
    inputs:
      - .foreman/env/snapshot.md
    outputs:
      - src/__tests__/
    scope:
      - src/__tests__/
    validate:
      - type: tests-fail
    retry: 2
  - id: impl-1-1
    type: llm
    description: Create `src/cli/plan.ts` — accepts description string, calls `foreman new` internally, outputs JSON payload with change name + file paths + description for engine skill
    agent: foreman-implementer
    deps:
      - write-tests
    inputs:
      - .foreman/env/snapshot.md
    outputs: &a1
      - src/
    scope: *a1
    validate:
      - type: tsc-check
      - type: tests-pass
    retry: 2
  - id: impl-1-2
    type: llm
    description: Add tests for plan command in `src/__tests__/cli/plan.test.ts`
