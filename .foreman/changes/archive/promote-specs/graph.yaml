change: promote-specs
version: "1"
created_at: 2026-03-26T16:05:41.793Z
nodes:
  - id: snapshot
    type: deterministic
    description: Capture environment snapshot (file tree, deps, types)
    command: foreman snapshot
    deps: []
    inputs: []
    outputs:
      - .foreman/env/snapshot.md
    scope: []
    validate:
      - type: file-exists
        args:
          path: .foreman/env/snapshot.md
    retry: 2
  - id: write-tests
    type: llm
    description: Write tests from specs (must be RED before implementation)
    agent: foreman-test-writer
    gate: human
    model: opus
    deps:
      - snapshot
    inputs:
      - .foreman/env/snapshot.md
    outputs:
      - src/__tests__/
    scope:
      - src/__tests__/
    validate:
      - type: tests-fail
    retry: 2
  - id: impl-1-1
    type: llm
    description: Add spec promotion step to `archiveChange()` in `src/core/archive.ts` — copy `<change>/specs/` contents to `.foreman/specs/`, overwriting on conflict
    agent: foreman-implementer
    deps:
      - write-tests
    inputs:
      - .foreman/env/snapshot.md
    outputs: &a1
      - src/
    scope: *a1
    validate:
      - type: tsc-check
      - type: tests-pass
    retry: 2
  - id: impl-1-2
    type: llm
    description: Add tests for spec promotion in `src/__tests__/core/archive.test.ts` — verify specs are copied to `.foreman/specs/` during archive
    agent: foreman-implementer
    deps:
      - impl-1-1
    inputs:
      - .foreman/env/snapshot.md
    outputs: &a2
      - src/
    scope: *a2
    validate:
      - type: tsc-check
      - type: tests-pass
    retry: 2
  - id: integration
    type: deterministic
    description: Run full test suite (integration verification)
    command: npm test
    deps:
      - impl-1-2
    inputs: []
    outputs: []
    scope: []
    validate:
      - type: tests-pass
    retry: 1
